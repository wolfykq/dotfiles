#  ANIMATIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━


animations {
    enabled = true
    
    bezier = premiumSmooth, 0.05, 0.9, 0.1, 1
    bezier = easeInOut, 0.42, 0, 0.58, 1
    bezier = windowsFade, 0.3, 1, 0.4, 1

    # 1. WINDOW ANIMATIONS (Smooth & Expressive)
    animation = windows, 1, 7, premiumSmooth
    animation = windowsIn, 1, 7, premiumSmooth, popin 75%
    animation = windowsOut, 1, 6, premiumSmooth, popin 75%
    animation = windowsMove, 1, 6, premiumSmooth, slide

    # 2. LAYER ANIMATIONS (Launchers, Bars, Notifications)
    animation = layers, 1, 5, easeInOut, fade
    animation = layersIn, 1, 5, premiumSmooth, fade
    animation = layersOut, 1, 4, premiumSmooth, fade

    # 3. FADE ANIMATIONS (Focus shifts & Opacity changes)
    animation = fade, 1, 6, windowsFade
    animation = fadeIn, 1, 5, windowsFade
    animation = fadeOut, 1, 5, windowsFade
    animation = fadeSwitch, 1, 7, windowsFade
    animation = fadeDim, 1, 7, windowsFade
    animation = fadeShadow, 1, 6, windowsFade

    # 4. WORKSPACE ANIMATIONS
    animation = workspaces, 1, 7, premiumSmooth, slidevert
    animation = specialWorkspace, 1, 6, premiumSmooth, fade
    
    # 5. BORDER ANIMATIONS
    animation = border, 1, 6, easeInOut
    animation = borderangle, 1, 50, easeInOut, loop
}