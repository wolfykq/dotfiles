#  SETTINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ---------------------------
#  GENERAL SETTINGS
# ---------------------------
general {
    no_fade_in = false
    grace = 0
    immediate_render = true
    ignore_empty_input = true
    disable_loading_bar = false
    screencopy_mode = 0
    hide_cursor = true
}

# ---------------------------
#  BACKGROUND
# ---------------------------
background {
    monitor =
    path = ~/Customizations/Mountain.jpg
    blur_passes = 5
    blur_size = 1
    contrast = 1
    brightness = 0.8
    vibrancy = 1
    vibrancy_darkness = 0.0
}

# ---------------------------
#  ANIMATIONS
# ---------------------------
animation {
    enabled = true

    bezier = premiumSmooth, 0.2, 0, 0.25, 1

    animation = fadeIn, 1, 4, premiumSmooth
    animation = fadeOut, 1, 4, premiumSmooth
    animation = inputFieldDots, 1, 3, premiumSmooth
}